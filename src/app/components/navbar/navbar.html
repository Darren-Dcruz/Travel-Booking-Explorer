<mat-toolbar color="primary" class="toolbar">
  <a class="brand" routerLink="/destinations">
    <mat-icon>travel_explore</mat-icon>
    <span>Travel Booking Explorer</span>
  </a>

  <nav class="nav-links">
    <a mat-button routerLink="/destinations" routerLinkActive="active-link">Destinations</a>
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
    <a mat-button routerLink="/register" routerLinkActive="active-link">Register</a>
  </nav>

  <div class="toolbar-actions">
    <button mat-stroked-button class="theme-toggle" (click)="toggleTheme()" type="button">
      <mat-icon>{{ (isDarkTheme$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
      {{ (isDarkTheme$ | async) ? 'Light' : 'Dark' }}
    </button>

    <span class="welcome" *ngIf="user$ | async as user">{{ user.name }}</span>

    <button mat-stroked-button color="accent" *ngIf="isLoggedIn$ | async" (click)="logout()" type="button">
      Logout
    </button>
    <button mat-stroked-button color="accent" *ngIf="!(isLoggedIn$ | async)" (click)="loginDemo()" type="button">
      Demo Login
    </button>
  </div>
</mat-toolbar>
