<mat-card *ngIf="packageData">
  <mat-card-header>
    <mat-card-title>Day-wise Itinerary</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let item of packageData.itinerary; let index = index">
        <mat-expansion-panel-header>
          <mat-panel-title>Day {{ index + 1 }}</mat-panel-title>
        </mat-expansion-panel-header>
        <p>{{ item }}</p>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-card-content>
</mat-card>
