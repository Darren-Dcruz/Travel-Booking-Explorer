<section class="registration-page">
  <mat-card>
    <mat-card-header>
      <mat-card-title>User Registration</mat-card-title>
      <mat-card-subtitle>Template-driven form with inline validation</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form #registrationForm="ngForm" (ngSubmit)="onSubmit(registrationForm)" novalidate>
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Full Name</mat-label>
            <input
              matInput
              name="name"
              [(ngModel)]="model.name"
              required
              minlength="3"
              #name="ngModel"
            />
            <mat-error *ngIf="name.invalid && name.touched">Name must be at least 3 characters.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input
              matInput
              type="email"
              name="email"
              [(ngModel)]="model.email"
              required
              email
              #email="ngModel"
            />
            <mat-error *ngIf="email.invalid && email.touched">Please enter a valid email.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Phone</mat-label>
            <input
              matInput
              type="tel"
              name="phone"
              [(ngModel)]="model.phone"
              required
              minlength="10"
              maxlength="10"
              pattern="^[0-9]{10}$"
              #phone="ngModel"
            />
            <mat-error *ngIf="phone.invalid && phone.touched">Enter a valid 10-digit phone number.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Preferred Travel Style</mat-label>
            <mat-select name="preferredTravelStyle" [(ngModel)]="model.preferredTravelStyle" required>
              <mat-option *ngFor="let style of travelStyles" [value]="style">{{ style }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-checkbox name="acceptTerms" [(ngModel)]="model.acceptTerms" required>
            I agree to the terms and privacy policy.
          </mat-checkbox>
        </div>

        <div class="actions">
          <button mat-stroked-button type="button" routerLink="/destinations">Cancel</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Submitting...' : 'Register' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</section>
